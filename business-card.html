<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Skills Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="card.css">
</head>
<body>
  <main class="print-sheet">
    <section class="business-card" aria-label="Business card front side">
      <div class="card-bg"></div>
      <div class="card-copy">
        <p class="card-kicker">Practical AI Skills</p>
        <h1>AI help for content, research, and simple workflows.</h1>
        <p class="card-line">Easy-to-medium AI skills, shaped into useful business support.</p>
      </div>
      <div class="qr-wrap">
        <img src="assets/qr.svg" alt="QR code linking to the Practical AI Skills website">
        <span>Scan to connect</span>
      </div>
    </section>
  </main>
</body>
</html>
